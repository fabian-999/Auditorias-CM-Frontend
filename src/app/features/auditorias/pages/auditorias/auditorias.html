<div class="pl-24 pr-8 pt-8 space-y-6">

  <!-- Toolbar de Auditorías (Búsqueda, Filtros, Botón Crear) -->
  <app-auditorias-toolbar
    (searchChange)="onSearch($event)"
    (openFilters)="onOpenFilters()"
    (createAuditoria)="onOpenCreateModal()"
  />

  <!-- Tabla de Auditorías con filtrado en vivo y acciones Editar/Eliminar -->
  <app-auditorias-table
    [searchQuery]="searchTerm()"
    (editAuditoria)="onEditAuditoria($event)"
    (deleteAuditoria)="onDeleteAuditoria($event)"
  />

  <!-- Modal Reutilizable para Crear y Editar Auditorías -->
  <app-auditoria-form-modal
    [isOpen]="isFormOpen()"
    [auditoriaToEdit]="selectedAuditoriaForEdit()"
    (close)="onCloseFormModal()"
    (save)="onSaveAuditoria($event)"
  />

  <!-- Modal de Confirmación para Eliminar Auditorías -->
  <app-auditoria-delete-modal
    [isOpen]="isDeleteOpen()"
    [auditoriaToDelete]="selectedAuditoriaForDelete()"
    (close)="onCloseDeleteModal()"
    (confirmDelete)="onConfirmDelete($event)"
  />

</div>
