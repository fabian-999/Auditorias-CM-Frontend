@if (isOpen() && auditoriaToDelete()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/70 backdrop-blur-md transition-opacity duration-300">
    <div class="relative w-full max-w-md bg-slate-900/90 border border-rose-500/30 rounded-2xl shadow-2xl shadow-rose-500/10 overflow-hidden p-6 transform transition-all text-center">
      
      <!-- Icono de Advertencia -->
      <div class="mx-auto w-14 h-14 rounded-full bg-rose-500/10 border border-rose-500/20 flex items-center justify-center text-rose-400 mb-4">
        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </div>

      <h3 class="text-xl font-bold text-white mb-2">
        ¿Eliminar Auditoría?
      </h3>

      <p class="text-sm text-slate-300 mb-6">
        ¿Estás seguro de que deseas eliminar la auditoría <strong class="text-emerald-300 font-semibold">"{{ auditoriaToDelete()?.title }}"</strong>? Esta acción no se puede deshacer.
      </p>

      <div class="flex items-center justify-center gap-3">
        <button 
          type="button" 
          (click)="onClose()"
          class="px-5 py-2.5 rounded-xl text-sm font-medium text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-all">
          Cancelar
        </button>
        <button 
          type="button"
          (click)="onConfirm()"
          class="px-5 py-2.5 rounded-xl text-sm font-medium text-white bg-rose-600 hover:bg-rose-500 transition-all shadow-md shadow-rose-600/30 active:scale-95">
          Sí, Eliminar
        </button>
      </div>

    </div>
  </div>
}
